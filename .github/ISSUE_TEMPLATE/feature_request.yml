name: Feature request
description: Propose a scoped project improvement.
title: "[Feature]: "
labels: ["enhancement", "needs design"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Why this fits project scope
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or security implications
    validations:
      required: true
